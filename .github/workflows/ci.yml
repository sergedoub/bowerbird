name: ci

# Offline test suite + provenance lint on every code change. The suite includes
# tests/test_samples.py, which lints the shipped sample wiki and verifies the sample
# recap feed against the real builder — so samples can't rot.

on:
  push:
    paths: ["src/**", "bin/**", "tests/**", "samples/**", "pyproject.toml", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["src/**", "bin/**", "tests/**", "samples/**", "pyproject.toml", ".github/workflows/ci.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python3 -m pip install -e '.[dev]'
      - run: python3 -m pytest
      - run: python3 bin/lint.py
