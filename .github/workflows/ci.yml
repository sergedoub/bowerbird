name: ci

# Offline test suite + provenance lint on code and compile-contract changes.

on:
  push:
    paths: ["src/**", "bin/**", "tests/**", "config/**", "raw/**", "wiki/**", "compile/**", "recaps/**", "pyproject.toml", ".github/workflows/**"]
  pull_request:
    paths: ["src/**", "bin/**", "tests/**", "config/**", "raw/**", "wiki/**", "compile/**", "recaps/**", "pyproject.toml", ".github/workflows/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python3 -m pip install -e '.[dev]'
      - run: python3 -m pytest
      - run: python3 bin/lint.py
