name: ci

# Offline test suite + provenance lint on every code change. The suite includes
# tests/test_demo_instance.py, which lints the shipped root demo wiki and
# validates root demo recap files/manifests against the real validators.

on:
  push:
    paths: ["src/**", "bin/**", "tests/**", "config/**", "raw/**", "wiki/**", "compile/recaps/**", "recaps/**", "pyproject.toml", ".github/workflows/**"]
  pull_request:
    paths: ["src/**", "bin/**", "tests/**", "config/**", "raw/**", "wiki/**", "compile/recaps/**", "recaps/**", "pyproject.toml", ".github/workflows/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python3 -m pip install -e '.[dev]'
      - run: python3 -m pytest
      - run: python3 bin/lint.py
