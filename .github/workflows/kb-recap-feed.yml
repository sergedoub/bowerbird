name: kb-recap-feed

# Writes compile/recap-feed.json: the source notes ADDED under wiki/*/sources/ in the
# last day, grouped into account lanes and topic lanes. This is the
# hand-off to whatever posts your daily recap (Slack connector agent, etc.).
#
# Why a CI-computed feed instead of letting a recap agent guess: "new since last recap"
# is a git fact (what the compile ADDED), not encodable in the notes — a note's filename
# carries its post date, which lags its wiki-add date when the compile catches up on a
# backlog. Feed logic lives in bin/recap_feed.py (kb.recap_feed, unit-tested); account
# display labels come from the optional `label` field in config/accounts.toml.
#
# Runs once a day -> at most one feed write -> exactly one recap post per day. Edit the
# cron line for your timezone (must run after your compile typically finishes); cron is
# the one accepted fork divergence (see docs/upgrading.md).

on:
  schedule:
    - cron: "30 0 * * *"   # daily, after the dump + pull compiles have finished
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kb-recap-feed
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for `git log --since`

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compute the day's new sources, grouped by recap lane
        run: python3 bin/recap_feed.py

      - name: Commit the feed if it changed
        env:
          PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain compile/recap-feed.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add compile/recap-feed.json
            git commit -m "kb-recap-feed: new sources for $(date -u +%Y-%m-%d)"
            git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            echo "No change to recap-feed.json."
          fi
